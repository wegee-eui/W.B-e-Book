<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EPUB Viewer</title>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<!-- epub.js -->
<script src="https://unpkg.com/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
}

/* 전체 무대 */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  box-sizing: border-box;
}

/* 책 컨테이너 */
#book-wrap {
  aspect-ratio: 200 / 185;
  height: min(85vh, 900px);
  width: auto;
  max-width: 95vw;
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 40px 120px rgba(0,0,0,.6);
  position: relative;
}

/* epub 영역 */
#viewer {
  width: 100%;
  height: 100%;
}

/* 페이지 버튼 */
#prevBtn, #nextBtn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  background: none;
  border: none;
  color: white;
  cursor: pointer;
  z-index: 10;
  opacity: .6;
}

#prevBtn:hover,
#nextBtn:hover {
  opacity: 1;
}

#prevBtn { left: 20px; }
#nextBtn { right: 20px; }

/* 모바일 토글 버튼 */
#viewToggle {
  position: absolute;
  bottom: 24px;
  right: 24px;
  padding: 10px 16px;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  z-index: 20;
}

/* 모바일 */
@media (max-width: 768px) {
  #book-wrap {
    aspect-ratio: 100 / 185;
    height: 85vh;
  }
}

/* 데스크탑에서는 토글 숨김 */
@media (min-width: 769px) {
  #viewToggle {
    display: none;
  }
}
</style>
</head>

<body>

<div id="stage">
  <div id="book-wrap">
    <div id="viewer"></div>

    <!-- UI -->
    <button id="prevBtn">‹</button>
    <button id="nextBtn">›</button>
    <button id="viewToggle">펼쳐보기</button>
  </div>
</div>

<script>
window.onload = function () {

  fetch("./book.epub")
    .then(res => res.arrayBuffer())
    .then(buffer => {

      const book = ePub(buffer);

      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      let currentSpread = isMobile ? "none" : "both";

      const rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        flow: "paginated",
        spread: currentSpread,
        manager: "default",
        snap: true,
        renditionLayout: "reflowable"   // 🔥 강제 변경
      });

      book.ready.then(() => {

        // 🔥 첫 spine 아이템을 명확히 왼쪽 시작으로
        const first = book.spine.get(0);
        rendition.display(first.href);

      });

      // ====================
      // 페이지 버튼
      // ====================

      document.getElementById("nextBtn").onclick = () => {
        rendition.next();
      };

      document.getElementById("prevBtn").onclick = () => {
        rendition.prev();
      };

      // ====================
      // 모바일 보기 전환
      // ====================

      function toggleSpread() {
        currentSpread = currentSpread === "none" ? "both" : "none";
        rendition.spread(currentSpread);
        rendition.resize();

        document.getElementById("viewToggle").textContent =
          currentSpread === "none" ? "펼쳐보기" : "한 장 보기";
      }

      document.getElementById("viewToggle").onclick = toggleSpread;

    });
};
</script>

</body>
</html>
