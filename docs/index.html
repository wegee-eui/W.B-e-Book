<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EPUB Test</title>

<script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#viewer {
  width: 100%;
  height: 100vh;
  background: white;
}
</style>
</head>

<body>

<div id="viewer"></div>

<script>
console.log("epub.js loaded?", typeof ePub);

var book = ePub("epub_w.b.epub");

book.ready
  .then(() => {
    console.log("BOOK READY");
    return book.loaded.navigation;
  })
  .then(() => {
    console.log("NAV READY");
  })
  .catch((err) => {
    console.error("BOOK ERROR:", err);
  });

var rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%"
});

rendition.display();
</script>

</body>
</html>
