<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EPUB Viewer</title>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<!-- epub.js (안정 CDN) -->
<script src="https://unpkg.com/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
}

/* 전체 무대 */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;   /* 항상 여백 유지 */
  box-sizing: border-box;
}

/* 책 컨테이너 */
#book-wrap {
  aspect-ratio: 200 / 185;   /* 데스크탑 기본 */
  height: min(85vh, 900px);  /* 🔥 세로 기준으로 먼저 맞춘다 */
  width: auto;               /* 가로는 비율로 자동 계산 */
  max-width: 95vw;           /* 화면 넘지 않게 */
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 40px 120px rgba(0,0,0,.6);
  position: relative;
}

/* epub 영역 */
#viewer {
  width: 100%;
  height: 100%;
}

/* 모바일 */
@media (max-width: 768px) {
  #book-wrap {
    aspect-ratio: 100 / 185;
    height: 85vh;
  }
}
  
</style>
</head>

<body>

<div id="stage">
  <div id="book-wrap">
    <div id="viewer"></div>
  </div>
</div>

<script>
window.onload = function () {
  console.log("epub.js loaded?", typeof ePub);

  fetch("./book.epub")
    .then(res => {
      console.log("Fetch status:", res.status);
      return res.arrayBuffer();
    })
    .then(buffer => {
      console.log("EPUB LOADED BUFFER");

      const book = ePub(buffer);

const isMobile = window.matchMedia("(max-width: 768px)").matches;

const rendition = book.renderTo("viewer", {
  width: "100%",
  height: "100%",
  spread: isMobile ? "none" : "auto",
  flow: "paginated"
});

      book.ready.then(() => {
        console.log("BOOK READY");
        rendition.display();
      });
    })
    .catch(err => console.error("FETCH ERROR:", err));
};
</script>
  
</body>
</html>
