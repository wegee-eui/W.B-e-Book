<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EPUB Viewer</title>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script>
window.JSZip = window.JSZip || JSZip;
</script>

<!-- epub.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/epub.js/0.3.93/epub.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
}

/* 🔥 전체 무대 (여백 담당) */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px; /* ← 바깥 여백 */
  box-sizing: border-box;
}

/* 🔥 책 컨테이너 */
#book-wrap {
  width: min(1200px, 100%);
  aspect-ratio: 1.414 / 1; /* 펼친 책 비율 (대략) */
  max-height: 90vh;
  border-radius: 18px; /* ← 귀도리 느낌 */
  overflow: hidden;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  background: white;
}

/* 🔥 실제 epub 영역 */
#viewer {
  width: 100%;
  height: 100%;
}

/* 📱 모바일 여백 조정 */
@media (max-width: 768px) {
  #stage {
    padding: 20px;
  }

  #book-wrap {
    aspect-ratio: 0.707 / 1; /* 한 페이지 비율 */
    border-radius: 14px;
  }
}
</style>
</head>

<body>

<div id="stage">
  <div id="book-wrap">
    <div id="viewer"></div>
  </div>
</div>

<script>
window.onload = function () {
  console.log("epub.js loaded?", typeof ePub);

  fetch("./book.epub")
    .then(res => res.arrayBuffer())
    .then(buffer => {

      const isMobile = window.matchMedia("(max-width: 768px)").matches;

      const book = ePub(buffer);

      const rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        spread: isMobile ? "none" : "auto", // 🔥 핵심
        flow: "paginated"
      });

      rendition.display();

      console.log("VIEWER READY");

    })
    .catch(err => console.error(err));
};
</script>

</body>
</html>
