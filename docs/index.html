<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EPUB Viewer</title>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>

<!-- epub.js (안정 CDN) -->
<script src="https://unpkg.com/epubjs@0.3.93/dist/epub.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
}

#stage {
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4vh 4vw;
  box-sizing: border-box;
}

#book-wrap {
  width: min(92vw, 1100px);
  aspect-ratio: 1.414 / 1;
  background: #111;
  border-radius: 16px;
  box-shadow: 0 30px 80px rgba(0,0,0,.5);
  overflow: hidden;
  position: relative;
}

#viewer {
  width: 100%;
  height: 100%;
  background: white;
}

/* 📱 모바일 */
@media (max-width: 768px) {
  #book-wrap {
    width: 92vw;
    aspect-ratio: 3 / 4;
  }
}
</style>
</head>

<body>

<div id="stage">
  <div id="book-wrap">
    <div id="viewer"></div>
  </div>
</div>

<script>
window.onload = function () {
  console.log("epub.js loaded?", typeof ePub);

  fetch("./book.epub")
    .then(res => {
      console.log("Fetch status:", res.status);
      return res.arrayBuffer();
    })
    .then(buffer => {
      console.log("EPUB LOADED BUFFER");

      const book = ePub(buffer);

      const rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        spread: "auto"
      });

      book.ready.then(() => {
        console.log("BOOK READY");
        rendition.display();
      });
    })
    .catch(err => console.error("FETCH ERROR:", err));
};
</script>
  
</body>
</html>
