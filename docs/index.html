<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>EPUB Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
<script>
window.JSZip = window.JSZip || JSZip;
</script>

<!-- ✅ 여기만 교체 -->
<script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}
#viewer {
  width: 100%;
  height: 100vh;
  background: white;
}
</style>
</head>

<body>

<div id="viewer"></div>

<script>
window.onload = function () {
  console.log("epub.js loaded?", typeof ePub);

  fetch("./book.epub")
    .then((res) => {
      console.log("Fetch status:", res.status);
      return res.arrayBuffer();
    })
    .then((buffer) => {
      console.log("EPUB LOADED BUFFER");

      const book = ePub(buffer);

      const rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        allowScriptedContent: true   // 🔥 추가
      });

      book.ready
        .then(() => book.loaded.navigation)
        .then(() => {
          rendition.display();
        })
        .catch((err) => {
          console.error("BOOK ERROR:", err);
        });
    })
    .catch((err) => {
      console.error("FETCH ERROR:", err);
    });
};
</script>

</body>
</html>
