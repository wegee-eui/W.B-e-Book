<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>EPUB Viewer</title>

  <!-- epub.js CDN -->
  <script src="https://unpkg.com/epubjs/dist/epub.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #viewer {
      width: 100%;
      height: 100vh;
      background: white;
    }
  </style>
</head>

<body>
  <div id="viewer"></div>

  <script>
    const book = ePub("epub_w.b.epub"); // ← epub 파일명 맞추기
    const rendition = book.renderTo("viewer", {
      width: "100%",
      height: "100%",
      spread: "auto"
    });

    rendition.display();
  </script>
</body>
</html>
